version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: offsideiq-db
    environment:
      POSTGRES_DB: offsideiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: offsideiq-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=offsideiq;Username=postgres;Password=yourpassword
      - Jwt__Secret=CHANGE_THIS_TO_A_VERY_LONG_RANDOM_SECRET_KEY_AT_LEAST_32_CHARS
      - Jwt__Issuer=OffsideIQ
      - Jwt__Audience=OffsideIQ
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
